<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For my princess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
  body { visibility: hidden; }
</style>
</head>
<body>

<canvas id="sky"></canvas>
<div id="stage">
  <div id="text-wrap">
    <span id="output"></span><span id="cursor">|</span>
  </div>
  <div id="nav">
    <a href="index.html" id="back-link">← back</a>
  </div>
</div>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  background: #080c1a; overflow-x: hidden;
}

canvas#sky {
  position: fixed; inset: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

#stage {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 72px 32px 100px;
}

#text-wrap {
  max-width: min(640px, 90vw);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-style: italic;
  font-size: clamp(18px, 3.5vw, 24px);
  line-height: 2; color: #dde8ff;
  text-align: center;
  text-shadow: 0 0 40px rgba(140, 180, 255, 0.15);
  letter-spacing: 0.02em;
  white-space: pre-wrap;
}

#cursor {
  display: inline-block;
  color: rgba(180, 210, 255, 0.6);
  animation: blink 1s step-start infinite;
  margin-left: 2px; font-style: normal;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

#nav {
  position: fixed; bottom: 28px;
  left: 50%; transform: translateX(-50%);
  opacity: 0; transition: opacity 1s ease;
}
#nav.show { opacity: 1; }

#back-link {
  font-family: 'Jost', sans-serif;
  font-weight: 300; font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(160, 185, 230, 0.35);
  text-decoration: none; text-transform: lowercase;
  transition: color 0.2s;
}
#back-link:hover { color: rgba(180, 210, 255, 0.65); }
</style>

<script>
const paragraphs = [
  "Baneen, er is niemand zoals jij. Vanaf het moment dat ik je zag en we begonnen te praten, was jij het enige wat in mijn hoofd zat. En niet soms, niet even, maar gewoon altijd. No other girl, no distractions, nothing. Just you my love. Hoe meer ik je leerde kennen, hoe meer ik ook begon te begrijpen waarom ik mij zo voelde.",
  "You are different. Niet op een corny manier, but genuinely different. The way we experienced the same stuff, the same pain, the same moments... It felt like I found someone who understood me in a way which made it unnecessary to explain everything myself. Dat is zeldzaam. Jij bent zeldzaam Baneen,",
  "Don't even get me started on your smile, the way youre funny without even trying. How lovely you are, how soft, how you give people the feeling that theyre welcome. Iedereen aan wie ik je heb voorgesteld, loves you, immediately. They saw immediately what I saw in you. That is no coincidence, that is just you my love :(",
  "I know my words may feel hollow after everything, but you've seen for yourself:\nThe way I look at you, the way I care for you. Dat was nooit nep of een act. Dat is hoe ik ben, voor jou, because you are worth it. There is no one in this world, past, present nor future, that could ever replace you. Neither in my head nor my heart.",
  "I love you in ways which are difficult to describe. And I wont just keep it to 'just telling you', I will show it to you, every single day."
];

const typingSpeed  = 32;
const pauseAfter   = 1200;
const pauseBetween = 600;

const output = document.getElementById('output');
const nav    = document.getElementById('nav');

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function typeText(text) {
  for (const ch of text) {
    output.textContent += ch;
    await sleep(typingSpeed + Math.random() * 16 - 8);
  }
}

async function run() {
  await sleep(900);
  for (let i = 0; i < paragraphs.length; i++) {
    await typeText(paragraphs[i]);
    await sleep(pauseAfter);
    if (i < paragraphs.length - 1) {
      output.textContent += '\n\n';
      await sleep(pauseBetween);
    }
  }
  nav.classList.add('show');
}

run();

(function() {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 8000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 0.9 + 0.2,
        a: Math.random() * 0.55 + 0.1,
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const grad = ctx.createRadialGradient(
      canvas.width * 0.5, canvas.height * 0.35, 0,
      canvas.width * 0.5, canvas.height * 0.35, canvas.width * 0.65
    );
    grad.addColorStop(0, 'rgba(20, 35, 72, 0.55)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`; ctx.fill();
    }
    t += 0.016;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
})();
</script>
<script type="module" src="auth-guard.js"></script>
</body>
</html>
