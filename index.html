<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For my princess</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  .home-scene {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 0; padding: 24px; width: 100%;
    opacity: 0; transform: translateY(18px);
    transition: opacity 1s ease, transform 1s ease;
    pointer-events: none;
  }

  .home-scene.visible {
    opacity: 1; transform: translateY(0); pointer-events: all;
  }

  .home-ily {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(13px, 2.8vw, 16px);
    letter-spacing: 0.32em;
    color: rgba(180, 205, 255, 0.38);
    text-transform: lowercase;
    margin-bottom: 36px;
    text-shadow: 0 0 28px rgba(140, 180, 255, 0.18);
  }

  .home-card {
    width: min(480px, 92vw);
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 52px 44px 48px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 0 40px rgba(130, 170, 255, 0.18),
      0 2px 60px rgba(0, 0, 0, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    display: flex; flex-direction: column; align-items: center;
  }

  .home-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(52px, 13vw, 78px);
    color: #dde8ff;
    letter-spacing: 0.04em;
    line-height: 1;
    text-shadow: 0 0 14px rgba(160, 200, 255, 0.5), 0 0 35px rgba(140, 180, 255, 0.25);
    margin-bottom: 6px;
  }

  .home-sub {
    font-family: 'Jost', sans-serif;
    font-weight: 300; font-size: 10px;
    letter-spacing: 0.22em; text-transform: lowercase;
    color: rgba(180, 200, 235, 0.3);
    margin-bottom: 44px;
  }

  .home-links {
    display: flex; flex-direction: column; align-items: stretch;
    gap: 14px; width: 100%;
  }

  .home-link {
    font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: 12px; letter-spacing: 0.2em; text-transform: lowercase;
    color: var(--accent); background: var(--btn-bg);
    border: 1px solid var(--btn-border); border-radius: 40px;
    padding: 13px 32px; cursor: pointer; text-decoration: none;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .home-link:hover {
    background: var(--btn-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(130, 170, 255, 0.2);
  }

  .home-link:active { transform: translateY(0); }

  .home-link span { opacity: 0.35; font-size: 11px; }

  .home-since {
    font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: 10px; letter-spacing: 0.18em;
    color: rgba(180, 200, 235, 0.22);
    margin-top: 36px;
  }

  @media (max-width: 400px) {
    .home-card { padding: 40px 28px 40px; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>
<canvas id="particles"></canvas>

<div id="intro">
  <div id="name-wrap">
    <span class="b-letter" data-i="0">B</span>
    <span class="b-letter" data-i="1">a</span>
    <span class="b-letter" data-i="2">n</span>
    <span class="b-letter" data-i="3">e</span>
    <span class="b-letter" data-i="4">e</span>
    <span class="b-letter" data-i="5">n</span>
  </div>
  <p id="tagline">my favourite person ♡</p>
  <p id="tap-hint">tap anywhere</p>
</div>

<div class="home-scene" id="homeScene">
  <p class="home-ily">i love you</p>
  <div class="home-card">
    <p class="home-name">Baneen</p>
    <p class="home-sub">my favourite person ♡</p>
    <div class="home-links">
      <a href="reasons.html" class="home-link">reasons i love you <span>→</span></a>
      <a href="typewriter.html" class="home-link">a letter for you <span>→</span></a>
      <a href="body.html" class="home-link">every part of you <span>→</span></a>
      <a href="dates.html" class="home-link">our dates <span>→</span></a>
    </div>
    <p class="home-since">since 26.03.2026</p>
  </div>
</div>

<script src="script.js"></script>
<script>
  const homeScene = document.getElementById('homeScene');

  intro.addEventListener('click', () => {
    if (!introPlayed) { playIntro(); return; }
    if (introDone) return;
    introDone = true;
    spawnBurst(window.innerWidth / 2, window.innerHeight / 2, 55);
    intro.classList.add('fade-away');
    setTimeout(() => {
      intro.style.display = 'none';
      homeScene.classList.add('visible');
    }, 1200);
  });
</script>
</body>
</html>
