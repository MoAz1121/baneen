<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For my princess</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />

<style>
html,body{margin:0;padding:0;background:#0b0f1e;color:#dde8ff;font-family:'Jost',sans-serif;overflow:hidden}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  background:#0b0f1e;
}
#login-card{
  width:320px;padding:30px;border-radius:20px;
  border:1px solid rgba(180,210,255,0.2);
  background:rgba(255,255,255,0.02);
  text-align:center;
}
#login-title{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-style:italic;margin-bottom:10px;
}
#login-sub{
  font-size:11px;letter-spacing:0.2em;margin-bottom:20px;color:rgba(180,200,235,0.4)
}
#login-card input{
  width:100%;padding:10px;border-radius:12px;
  border:1px solid rgba(180,210,255,0.2);
  background:rgba(255,255,255,0.04);
  color:#fff;margin-bottom:10px;text-align:center;
}
#login-btn{
  width:100%;padding:10px;border-radius:30px;
  border:1px solid rgba(180,210,255,0.3);
  background:rgba(140,180,255,0.1);
  color:#fff;cursor:pointer;
}
#login-error{font-size:11px;color:#ff8c8c;margin-top:10px}

/* HOME */
.home{
  display:none;align-items:center;justify-content:center;
  height:100vh;text-align:center;flex-direction:column;
}
.home.visible{display:flex}

.home a{
  margin-top:10px;
  display:block;
  color:#9ebdf0;
  text-decoration:none;
}

#logout{
  position:fixed;top:20px;right:20px;
  border:1px solid rgba(180,210,255,0.2);
  background:transparent;color:#9ebdf0;
  padding:6px 12px;border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-card">
    <div id="login-title">Baneen</div>
    <div id="login-sub">sign in</div>
    <input id="login-username" placeholder="username" />
    <input id="login-password" type="password" placeholder="password" />
    <button id="login-btn">enter ♡</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- HOME -->
<div id="home" class="home">
  <h1 style="font-family:'Cormorant Garamond',serif;font-style:italic;">Baneen</h1>

  <a href="dates.html">our dates →</a>
  <a href="bucket.html">our bucket list →</a>
  <a href="reasons.html">reasons i love you →</a>

</div>

<button id="logout" style="display:none;">logout</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc2BHnL7JKAi8N9HSjsWYV35e3YtWTjxU",
  authDomain: "baneen-2f47c.firebaseapp.com",
  projectId: "baneen-2f47c",
  storageBucket: "baneen-2f47c.firebasestorage.app",
  messagingSenderId: "955214840494",
  appId: "1:955214840494:web:9c41429a87943cb7ae633f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function usernameToEmail(username){
  return username.trim().toLowerCase() + "@bucket.local";
}

async function login(){
  const user = document.getElementById("login-username").value;
  const pass = document.getElementById("login-password").value;
  const err = document.getElementById("login-error");

  err.textContent = "";

  try{
    await signInWithEmailAndPassword(auth, usernameToEmail(user), pass);
  }catch(e){
    err.textContent = "login failed";
  }
}

document.getElementById("login-btn").onclick = login;

document.getElementById("login-password").addEventListener("keydown",(e)=>{
  if(e.key==="Enter") login();
});

document.getElementById("login-username").addEventListener("keydown",(e)=>{
  if(e.key==="Enter") login();
});

onAuthStateChanged(auth,(user)=>{
  const loginScreen = document.getElementById("login-screen");
  const home = document.getElementById("home");
  const logout = document.getElementById("logout");

  if(user){
    loginScreen.style.display="none";
    home.classList.add("visible");
    logout.style.display="block";
  }else{
    loginScreen.style.display="flex";
    home.classList.remove("visible");
    logout.style.display="none";
  }
});

document.getElementById("logout").onclick = async ()=>{
  await signOut(auth);
};
</script>

</body>
</html>
