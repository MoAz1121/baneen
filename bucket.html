<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>our bucket list</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

<canvas id="sky"></canvas>

<div id="stage">
  <p id="page-title">our bucket list</p>
  <p id="page-sub">all the little things we still want to do together</p>

  <button id="add-btn" onclick="openModal()">+ add a dream</button>

  <div id="loading-state"><p>loading our dreams...</p></div>
  <div id="bucket-grid"></div>

  <div id="empty-state">
    <p>nothing here yet...</p>
    <p class="hint">add the first thing you want to do together ♡</p>
  </div>

  <a href="index.html" id="back-link">← back</a>
</div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <p id="modal-title">add to our bucket list</p>

    <div class="field">
      <label>title</label>
      <input type="text" id="inp-title" placeholder="e.g. watch the stars together" />
    </div>

    <div class="field">
      <label>category</label>
      <input type="text" id="inp-category" placeholder="e.g. travel, cozy, food..." />
    </div>

    <div class="field">
      <label>note</label>
      <textarea id="inp-note" placeholder="what makes this special..."></textarea>
    </div>

    <div id="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveItem()">save ♡</button>
    </div>
  </div>
</div>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; background: #080c1a; font-family: 'Jost', sans-serif; overflow-x: hidden; }
canvas#sky { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

#stage {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 100px;
  min-height: 100vh;
}

#page-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(28px, 6vw, 42px);
  color: #dde8ff;
  letter-spacing: 0.04em;
  text-shadow: 0 0 40px rgba(140,180,255,0.2);
}

#page-sub {
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: rgba(160,185,230,0.38);
  margin-top: 8px;
  margin-bottom: 32px;
  text-align: center;
}

#add-btn {
  background: transparent;
  border: 1px solid rgba(180,210,255,0.25);
  color: rgba(180,210,255,0.65);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  padding: 10px 28px;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 40px;
}

#add-btn:hover {
  border-color: rgba(180,210,255,0.55);
  color: rgba(200,225,255,0.9);
  background: rgba(140,180,255,0.06);
}

#loading-state {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 18px;
  color: rgba(160,185,230,0.25);
  margin-top: 40px;
}

#bucket-grid {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.bucket-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(180,210,255,0.12);
  border-radius: 18px;
  padding: 20px 18px 18px;
  transition: border-color 0.3s ease, transform 0.3s ease;
}

.bucket-card:hover {
  border-color: rgba(180,210,255,0.3);
  transform: translateY(-3px);
}

.bucket-card.done {
  opacity: 0.66;
  border-color: rgba(160,220,180,0.16);
}

.bucket-card.done .bucket-title {
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}

.bucket-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.bucket-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 24px;
  line-height: 1.2;
  color: #d8e5ff;
}

.bucket-check {
  width: 20px;
  height: 20px;
  accent-color: #9ebdf0;
  cursor: pointer;
  margin-top: 4px;
  flex-shrink: 0;
}

.bucket-category {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(160,185,230,0.45);
  margin-bottom: 10px;
}

.bucket-note {
  font-size: 12px;
  font-weight: 300;
  color: rgba(160,185,230,0.55);
  line-height: 1.7;
}

.bucket-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  gap: 12px;
}

.bucket-status {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: lowercase;
  color: rgba(180,210,255,0.32);
}

.bucket-delete {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: lowercase;
  color: rgba(255,140,140,0.22);
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Jost', sans-serif;
  transition: color 0.2s;
}

.bucket-delete:hover {
  color: rgba(255,140,140,0.55);
}

#empty-state {
  text-align: center;
  margin-top: 40px;
  display: none;
}

#empty-state p {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 22px;
  color: rgba(160,185,230,0.25);
}

#empty-state .hint {
  font-family: 'Jost', sans-serif;
  font-size: 11px;
  letter-spacing: 0.16em;
  color: rgba(160,185,230,0.18);
  margin-top: 8px;
  font-style: normal;
}

#back-link {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  color: rgba(160,185,230,0.28);
  text-decoration: none;
  transition: color 0.2s;
  z-index: 10;
}

#back-link:hover {
  color: rgba(180,210,255,0.6);
}

#modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(4,6,18,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  backdrop-filter: blur(6px);
}

#modal-overlay.open { display: flex; }

#modal {
  background: #0d1326;
  border: 1px solid rgba(180,210,255,0.15);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 460px;
}

#modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 24px;
  color: #dde8ff;
  margin-bottom: 24px;
  letter-spacing: 0.04em;
}

.field { margin-bottom: 20px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(160,185,230,0.38);
  margin-bottom: 8px;
}

.field input,
.field textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(180,210,255,0.12);
  border-radius: 10px;
  padding: 10px 14px;
  color: #c8d8f8;
  font-family: 'Jost', sans-serif;
  font-size: 14px;
  font-weight: 300;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus,
.field textarea:focus {
  border-color: rgba(180,210,255,0.35);
}

.field input::placeholder,
.field textarea::placeholder {
  color: rgba(160,185,230,0.22);
}

.field textarea {
  resize: none;
  height: 90px;
  line-height: 1.6;
}

#modal-btns {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.btn-cancel,
.btn-save {
  flex: 1;
  padding: 12px;
  border-radius: 40px;
  font-family: 'Jost', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: lowercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-cancel {
  background: transparent;
  border: 1px solid rgba(180,210,255,0.15);
  color: rgba(160,185,230,0.45);
}

.btn-cancel:hover {
  border-color: rgba(180,210,255,0.3);
  color: rgba(180,210,255,0.65);
}

.btn-save {
  background: rgba(140,180,255,0.1);
  border: 1px solid rgba(180,210,255,0.3);
  color: rgba(200,225,255,0.85);
}

.btn-save:hover {
  background: rgba(140,180,255,0.18);
}

.btn-save:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

@media (max-width: 540px) {
  #bucket-grid { grid-template-columns: 1fr; }
  #modal { padding: 24px 20px; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc,
  orderBy,
  query
} from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCc2BHnL7JKAi8N9HSjsWYV35e3YtWTjxU",
  authDomain: "baneen-2f47c.firebaseapp.com",
  projectId: "baneen-2f47c",
  storageBucket: "baneen-2f47c.firebasestorage.app",
  messagingSenderId: "955214840494",
  appId: "1:955214840494:web:9c41429a87943cb7ae633f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function loadItems() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('bucket-grid').innerHTML = '';

  try {
    const q = query(collection(db, 'bucketList'), orderBy('createdAt', 'desc'));
    const snapshot = await getDocs(q);

    document.getElementById('loading-state').style.display = 'none';

    if (snapshot.empty) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    const grid = document.getElementById('bucket-grid');
    snapshot.forEach(docSnap => renderCard(grid, docSnap.id, docSnap.data()));
  } catch (err) {
    document.getElementById('loading-state').innerHTML =
      '<p style="color:rgba(255,140,140,0.45);font-size:12px;letter-spacing:0.1em;">could not load — check firestore rules</p>';
    console.error(err);
  }
}

function renderCard(grid, id, item) {
  const card = document.createElement('div');
  card.className = `bucket-card ${item.done ? 'done' : ''}`;

  card.innerHTML = `
    <div class="bucket-top">
      <p class="bucket-title">${escapeHtml(item.title || 'untitled')}</p>
      <input class="bucket-check" type="checkbox" ${item.done ? 'checked' : ''} />
    </div>
    ${item.category ? `<p class="bucket-category">${escapeHtml(item.category)}</p>` : ''}
    ${item.note ? `<p class="bucket-note">${escapeHtml(item.note)}</p>` : ''}
    <div class="bucket-meta">
      <p class="bucket-status">${item.done ? 'done ♡' : 'still to do'}</p>
      <button class="bucket-delete">remove</button>
    </div>
  `;

  card.querySelector('.bucket-check').addEventListener('change', async (e) => {
    try {
      await updateDoc(doc(db, 'bucketList', id), {
        done: e.target.checked
      });
      loadItems();
    } catch (err) {
      console.error(err);
      alert('Could not update item.');
    }
  });

  card.querySelector('.bucket-delete').addEventListener('click', async () => {
    try {
      await deleteDoc(doc(db, 'bucketList', id));
      card.remove();
      if (!document.getElementById('bucket-grid').children.length) {
        document.getElementById('empty-state').style.display = 'block';
      }
    } catch (err) {
      console.error(err);
      alert('Could not remove item.');
    }
  });

  grid.appendChild(card);
}

window.saveItem = async function() {
  const title = document.getElementById('inp-title').value.trim();
  const category = document.getElementById('inp-category').value.trim();
  const note = document.getElementById('inp-note').value.trim();

  if (!title) {
    document.getElementById('inp-title').focus();
    return;
  }

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'saving...';

  try {
    await addDoc(collection(db, 'bucketList'), {
      title,
      category,
      note,
      done: false,
      createdAt: Date.now()
    });

    document.getElementById('modal-overlay').classList.remove('open');
    saveBtn.disabled = false;
    saveBtn.textContent = 'save ♡';
    loadItems();
  } catch (err) {
    saveBtn.disabled = false;
    saveBtn.textContent = 'save ♡';
    alert('Something went wrong: ' + err.message);
  }
};

window.openModal = function() {
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-category').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('save-btn').disabled = false;
  document.getElementById('save-btn').textContent = 'save ♡';
  document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal = function(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
};

loadItems();
</script>

<script>
(function() {
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    const count = Math.floor(canvas.width * canvas.height / 7000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 0.9 + 0.2,
        a: Math.random() * 0.55 + 0.1,
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let t = 0;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const grad = ctx.createRadialGradient(
      canvas.width * .5, canvas.height * .3, 0,
      canvas.width * .5, canvas.height * .3, canvas.width * .6
    );
    grad.addColorStop(0, 'rgba(20,35,72,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const s of stars) {
      const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    }

    t += 0.016;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();
</script>

</body>
</html>
